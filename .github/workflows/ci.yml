name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/priyanka1997devaraj/devops-task-manager

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/priyanka1997devaraj/devops-task-manager:${{ github.sha }}
            ghcr.io/priyanka1997devaraj/devops-task-manager:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in GitOps repo
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/priyanka1997devaraj/devops-task-manager-gitops.git
          cd devops-task-manager-gitops
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" helm/values.yaml
          git config user.email "ci@github.com"
          git config user.name "CI Bot"
          git commit -am "chore: bump image to ${{ github.sha }}"
          git push
